<!DOCTYPE html>
<html>
<head>
    <title>Practice 3 - JavaScript Password Verification</title>
</head>
<body>
    <h2>Practice 3 - JavaScript Password Verification</h2>
    Password: <input type="password" id="pass1"> <br>
    Validate Password: <input type="password" id="pass2"> <br>
    <button onclick="validate()">Verify</button><br><br>

    <script>
        function validate() {
            // Get the values from both passwords by their ids
            let p1 = document.getElementById("pass1").value;
            let p2 = document.getElementById("pass2").value;
            
            // Check the lenght is 8 characters long
            if (p1.length < 8) {
                alert("The password is not at least eight characters long!");
            // Check if the values are the same
            } else if (p1 !== p2) {
                alert("The two passwords are different!");
            // Confirm matching passwords
            } else {
                alert("The two passwords matched!");
            }
        }
    </script>
    <a href="index.html">Return to Index</a>

</body>
</html>
